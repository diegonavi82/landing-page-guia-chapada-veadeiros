<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="light" />
<meta name="theme-color" content="#0f3d2e" />
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" href="https://www.guiachapadaveadeiros.com/favicon.ico" sizes="48x48" />
<title>Cadastro de Guia | Guia Chapada Veadeiros</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/css/site.css?v=1.0.8" />
<link rel="stylesheet" href="/assets/css/gcv-auth.css?v=1.0.0" />
</head>
<body>
<div class="gcv-auth-page gcv-auth-page--guide">
  <div class="gcv-auth-card">
    <a class="gcv-auth-logo" href="/index.html">
      <img src="/assets/img/imagens/logo-guia-chapada-veadeiros-oficial.png" alt="Guia Chapada Veadeiros" width="180" height="33" />
    </a>

    <div class="gcv-auth-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" width="18" height="18"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      Guia Credenciado CADASTUR
    </div>

    <h1 class="gcv-auth-title">Cadastro de Guia</h1>
    <p class="gcv-auth-subtitle">Publique seus passeios e receba reservas direto no painel</p>

    <div id="gcv-auth-error" class="gcv-auth-error" hidden></div>
    <div id="gcv-auth-success" class="gcv-auth-success" hidden></div>

    <form id="gcv-register-form" novalidate data-locale="pt" data-context="guide">
      <input type="hidden" id="register-role" name="role" value="guide" />
      <div class="gcv-auth-field">
        <label class="gcv-auth-label" for="register-name">Nome completo</label>
        <input class="gcv-auth-input" id="register-name" name="name" type="text" autocomplete="name" required />
      </div>
      <div class="gcv-auth-field">
        <label class="gcv-auth-label" for="register-email">Email</label>
        <input class="gcv-auth-input" id="register-email" name="email" type="email" autocomplete="email" required />
      </div>
      <div class="gcv-auth-field">
        <label class="gcv-auth-label" for="register-password">Senha</label>
        <input class="gcv-auth-input" id="register-password" name="password" type="password" autocomplete="new-password" required />
        <div class="gcv-auth-strength" id="gcv-strength-bars" aria-hidden="true">
          <div class="gcv-auth-strength-bar"></div>
          <div class="gcv-auth-strength-bar"></div>
          <div class="gcv-auth-strength-bar"></div>
        </div>
        <div class="gcv-auth-strength-label" id="gcv-strength-label"></div>
      </div>
      <div class="gcv-auth-field">
        <label class="gcv-auth-label" for="register-confirm">Confirmar senha</label>
        <input class="gcv-auth-input" id="register-confirm" name="password_confirm" type="password" autocomplete="new-password" required />
      </div>
      <div class="gcv-auth-field">
        <label class="gcv-auth-label" for="register-cadastur">Número Cadastur <span class="gcv-auth-optional">(opcional)</span></label>
        <input class="gcv-auth-input" id="register-cadastur" name="cadastur" type="text" placeholder="Ex.: 12345678" />
      </div>
      <div class="gcv-auth-note">
        Sua conta passará por revisão antes de publicar passeios. Você receberá um email de confirmação.
      </div>
      <button class="gcv-auth-btn gcv-auth-btn--primary" type="submit" id="gcv-register-btn">Criar conta de guia</button>
    </form>

    <div class="gcv-auth-links">
      Já tem conta? <a href="/guia/login.html">Entrar na Área do Guia</a>
    </div>

    <div class="gcv-auth-separator"></div>
    <p class="gcv-auth-switch">
      É turista ou cliente?
      <a href="/cadastro.html" class="gcv-auth-switch__link">← Cadastro de Cliente</a>
    </p>
  </div>
</div>

</body>
</html>
