<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" href="https://www.guiachapadaveadeiros.com/favicon.ico" sizes="48x48" />
<title>Restablecer Contraseña | Guia Chapada Veadeiros</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/css/site.css?v=1.0.8" />
<link rel="stylesheet" href="/assets/css/gcv-auth.css?v=1.0.0" />
</head>
<body>
<div class="gcv-auth-page">
  <div class="gcv-auth-card">
    <a class="gcv-auth-logo" href="/index.html"><img src="/assets/img/imagens/logo-guia-chapada-veadeiros-oficial.png" alt="Guia Chapada Veadeiros" width="180" height="33" /></a>
    <h1 class="gcv-auth-title">Restablecer contraseña</h1>
    <p class="gcv-auth-subtitle">Elige una nueva contraseña segura</p>
    <div id="gcv-auth-error" class="gcv-auth-error" hidden></div>
    <div id="gcv-auth-success" class="gcv-auth-success" hidden></div>
    <form id="gcv-reset-form" novalidate data-locale="es">
      <div class="gcv-auth-field">
        <label class="gcv-auth-label" for="reset-password">Nueva contraseña</label>
        <input class="gcv-auth-input" id="reset-password" name="password" type="password" autocomplete="new-password" required />
        <div class="gcv-auth-strength" id="gcv-strength-bars" aria-hidden="true"><div class="gcv-auth-strength-bar"></div><div class="gcv-auth-strength-bar"></div><div class="gcv-auth-strength-bar"></div></div>
        <div class="gcv-auth-strength-label" id="gcv-strength-label"></div>
      </div>
      <div class="gcv-auth-field">
        <label class="gcv-auth-label" for="reset-confirm">Confirmar nueva contraseña</label>
        <input class="gcv-auth-input" id="reset-confirm" name="password_confirm" type="password" autocomplete="new-password" required />
      </div>
      <button class="gcv-auth-btn gcv-auth-btn--primary" type="submit">Restablecer contraseña</button>
    </form>
    <div class="gcv-auth-links" style="margin-top:20px;"><a href="/es/login.html">← Volver al inicio de sesión</a></div>
  </div>
</div>
<script src="/assets/js/gcv-auth.js?v=1.0.0" defer></script>
</body>
</html>
