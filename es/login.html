<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex,nofollow" />
<link rel="icon" href="https://www.guiachapadaveadeiros.com/favicon.ico" sizes="48x48" />
<title>Iniciar Sesión | Guia Chapada Veadeiros</title>
<link rel="alternate" hreflang="pt-BR" href="https://www.guiachapadaveadeiros.com/login.html" />
<link rel="alternate" hreflang="en" href="https://www.guiachapadaveadeiros.com/en/login.html" />
<link rel="alternate" hreflang="es" href="https://www.guiachapadaveadeiros.com/es/login.html" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/assets/css/site.css?v=1.0.8" />
<link rel="stylesheet" href="/assets/css/gcv-auth.css?v=1.0.0" />
</head>
<body>
<div class="gcv-auth-page">
  <div class="gcv-auth-card">
    <a class="gcv-auth-logo" href="/index.html"><img src="/assets/img/imagens/logo-guia-chapada-veadeiros-oficial.png" alt="Guia Chapada Veadeiros" width="180" height="33" /></a>
    <h1 class="gcv-auth-title">Iniciar sesión</h1>
    <p class="gcv-auth-subtitle">Accede a tu cuenta</p>
    <div id="gcv-auth-error" class="gcv-auth-error" hidden></div>
    <a class="gcv-auth-btn gcv-auth-btn--google" href="/api/auth/google-redirect.php">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Entrar con Google
    </a>
    <div class="gcv-auth-divider">o</div>
    <form id="gcv-login-form" novalidate data-locale="es">
      <div class="gcv-auth-field">
        <label class="gcv-auth-label" for="login-email">Correo electrónico</label>
        <input class="gcv-auth-input" id="login-email" name="email" type="email" autocomplete="email" required />
      </div>
      <div class="gcv-auth-field">
        <label class="gcv-auth-label" for="login-password">Contraseña</label>
        <input class="gcv-auth-input" id="login-password" name="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="gcv-auth-btn gcv-auth-btn--primary" type="submit">Iniciar sesión</button>
    </form>
    <div class="gcv-auth-links">
      <a href="/es/olvide-contrasena.html">Olvidé mi contraseña</a>
      &nbsp;·&nbsp;
      ¿No tienes cuenta? <a href="/es/registro.html">Crear cuenta</a>
    </div>
  </div>
</div>
<script src="/assets/js/gcv-auth.js?v=1.0.0" defer></script>
</body>
</html>
