name: Deploy Hostinger (FTP)
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-ftp
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build (Build_prod)
        run: |
          npm ci
          npm run build
          test -f Build_prod/api/helpers/user_roles.php
          test -f Build_prod/api/helpers/guides_seed.php
          test -f Build_prod/api/helpers/excursion_attractions.php
          test -f Build_prod/api/admin/seed-test-excursion.php
          test -f Build_prod/api/admin/deploy-check.php
          test -f Build_prod/deploy-canary.txt
          echo "Build_prod API helpers OK"

      - name: Verificar secrets FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          ok=0
          if [ -z "$FTP_SERVER" ]; then echo "::error::Secret FTP_SERVER está vazio ou não existe."; ok=1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::Secret FTP_USERNAME está vazio ou não existe."; ok=1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::Secret FTP_PASSWORD está vazio ou não existe."; ok=1; fi
          exit $ok

      # Destino: na Hostinger o login FTP costuma ser a HOME (acima do site).
      # Por isso usamos public_html/ — se o FTP já abrir dentro de public_html, mude o secret FTP_REMOTE_DIR para ./
      - name: Forçar reupload completo
        if: contains(github.event.head_commit.message, '[ftp-full]') || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SECURE: "true"
          FTP_REMOTE_DIR: public_html/
        run: node tools/ftp-reset-sync-state.mjs

      - name: Deploy FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ./Build_prod/
          # FTP Homeinger costuma abrir na HOME → precisa public_html/
          # Se criar public_html/public_html, mude para: ./
          server-dir: public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.env
            **/.env.*
            **/config.local.php
            **/error_log
            **/.gitkeep
            **/assets/img/uploads/**
          log-level: verbose
