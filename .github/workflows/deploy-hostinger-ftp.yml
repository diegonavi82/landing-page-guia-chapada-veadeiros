name: Deploy Hostinger (FTP)
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-ftp
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build (Build_prod)
        run: |
          npm ci
          npm run build

      - name: Verificar secrets FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          ok=0
          if [ -z "$FTP_SERVER" ]; then echo "::error::Secret FTP_SERVER está vazio ou não existe."; ok=1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::Secret FTP_USERNAME está vazio ou não existe."; ok=1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::Secret FTP_PASSWORD está vazio ou não existe."; ok=1; fi
          exit $ok

      # Sem o state file, o FTP reenvia o pacote inteiro (Build_prod)
      - name: Forçar reupload completo
        if: contains(github.event.head_commit.message, '[ftp-full]') || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SECURE: "true"
          FTP_REMOTE_DIR: ./
        run: node tools/ftp-reset-sync-state.mjs

      - name: Deploy FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          local-dir: ./Build_prod/
          server-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.env
            **/.env.*
            **/config.local.php
            **/error_log
            **/.gitkeep
            **/assets/img/uploads/**
          log-level: standard
