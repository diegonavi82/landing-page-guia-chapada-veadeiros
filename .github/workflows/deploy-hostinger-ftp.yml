# Deploy automático: cada git PUSH para a branch main no GitHub dispara este workflow
# e envia os arquivos para a Hostinger (public_html). Commit só no PC não atualiza o site —
# é preciso: git push origin main (ou Sync/Push no Cursor/VS Code).
#
# Secrets obrigatórios (GitHub → Settings → Secrets and variables → Actions):
#   FTP_SERVER   — host FTP do hPanel (ex.: ftp.seudominio.com ou o hostname indicado pela Hostinger)
#   FTP_USERNAME — usuário FTP
#   FTP_PASSWORD — senha FTP
#
# Pasta no servidor: ajuste server-dir abaixo se o hPanel usar outro caminho
# (ex.: domains/seusite.com/public_html/). Protocolo: troque para ftp se FTPS falhar.
#
name: Deploy Hostinger (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-ftp
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: public_html/
          # Site estático já versionado na raiz do repositório (sem npm run build aqui).
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/package.json
            **/package-lock.json
            **/.env
            **/.env.*
            **/tools/**
            **/LEIA-ME.txt
          log-level: minimal
