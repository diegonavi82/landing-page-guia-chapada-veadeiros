# Deploy automático: push para `main` ou execução manual (Actions → Deploy Hostinger → Run workflow).
name: Deploy Hostinger (FTP)
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-ftp
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar secrets FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          ok=0
          if [ -z "$FTP_SERVER" ]; then echo "::error::Secret FTP_SERVER está vazio ou não existe."; ok=1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::Secret FTP_USERNAME está vazio ou não existe."; ok=1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::Secret FTP_PASSWORD está vazio ou não existe."; ok=1; fi
          exit $ok

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Instalar dependências e gerar HTML (build)
        run: |
          npm ci
          npm run build

      - name: Verificar output do build
        run: |
          echo "=== RAIZ ==="
          ls -la
          echo "=== PASTA DIST (se existir) ==="
          ls -la ./dist/ 2>/dev/null || echo "pasta dist não existe"
          echo "=== PASTA BUILD (se existir) ==="
          ls -la ./build/ 2>/dev/null || echo "pasta build não existe"
          echo "=== PASTA PUBLIC (se existir) ==="
          ls -la ./public/ 2>/dev/null || echo "pasta public não existe"

      - name: Deploy FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: ./public_html/
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/package.json
            **/package-lock.json
            **/.env
            **/.env.*
            **/tools/**
            **/LEIA-ME.txt
            **/.cursor/**
            **/.vscode/**
          log-level: verbose
