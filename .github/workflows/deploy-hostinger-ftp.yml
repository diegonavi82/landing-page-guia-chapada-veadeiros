# Deploy automático: push para `main` ou execução manual (Actions → Deploy Hostinger → Run workflow).
#
# Secrets (repo → Settings → Secrets and variables → Actions → New repository secret):
#   FTP_SERVER   — só o hostname, SEM ftp:// (ex.: ftp.seudominio.com ou o que o hPanel mostrar)
#   FTP_USERNAME — usuário FTP
#   FTP_PASSWORD — senha FTP
#
# Se falhar com ENOTFOUND: o host em FTP_SERVER não existe na internet (typo, secret errado,
# ou hostname só válido na rede local). Confira no hPanel → Arquivos → contas FTP o “FTP hostname”.
#
# Se falhar handshake TLS: troque `protocol` para `ftp` (FTP simples, porta 21) ou teste `ftps-legacy`.
#
# Pasta remota: em muitos planos Hostinger o caminho é `public_html/`; em domínios extras pode ser
# `domains/seusite.com/public_html/` — ajuste `server-dir` abaixo conforme o hPanel (FTP → diretório raiz).
#
name: Deploy Hostinger (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-ftp
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar secrets FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          ok=0
          if [ -z "$FTP_SERVER" ]; then echo "::error::Secret FTP_SERVER está vazio ou não existe."; ok=1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::Secret FTP_USERNAME está vazio ou não existe."; ok=1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::Secret FTP_PASSWORD está vazio ou não existe."; ok=1; fi
          exit $ok

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Instalar dependências e gerar HTML (build)
        run: npm ci && npm run build

      - name: Deploy FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: public_html/
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/package.json
            **/package-lock.json
            **/.env
            **/.env.*
            **/tools/**
            **/LEIA-ME.txt
          log-level: minimal
